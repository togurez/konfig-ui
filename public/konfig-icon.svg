<svg width="300" height="300" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>konfig app icon</title>
  <desc>Dark rounded square with a geometric golden K lettermark and corner bracket decorations</desc>

  <defs>
    <radialGradient id="bgGrad" cx="42%" cy="38%" r="68%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#2E3037"/>
      <stop offset="100%" stop-color="#26282E"/>
    </radialGradient>
    <clipPath id="roundClip">
      <rect width="300" height="300" rx="56"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="300" height="300" rx="56" fill="url(#bgGrad)"/>

  <!-- Subtle inner border -->
  <rect x="1.5" y="1.5" width="297" height="297" rx="55" fill="none" stroke="#383A42" stroke-width="1.5" opacity="0.7"/>

  <!-- Corner brackets (top-left) -->
  <path d="M 34 56 L 34 34 L 56 34" fill="none" stroke="#4A4C55" stroke-width="2" stroke-linecap="round"/>
  <!-- Corner brackets (top-right) -->
  <path d="M 244 34 L 266 34 L 266 56" fill="none" stroke="#4A4C55" stroke-width="2" stroke-linecap="round"/>
  <!-- Corner brackets (bottom-left) -->
  <path d="M 34 244 L 34 266 L 56 266" fill="none" stroke="#4A4C55" stroke-width="2" stroke-linecap="round"/>
  <!-- Corner brackets (bottom-right) -->
  <path d="M 266 244 L 266 266 L 244 266" fill="none" stroke="#4A4C55" stroke-width="2" stroke-linecap="round"/>

  <!-- K lettermark -->
  <!-- Vertical stem -->
  <line x1="90" y1="60" x2="90" y2="240"
        stroke="#D9A35B" stroke-width="24" stroke-linecap="round"/>
  <!-- Upper arm -->
  <line x1="102" y1="148" x2="214" y2="65"
        stroke="#D9A35B" stroke-width="24" stroke-linecap="round"/>
  <!-- Lower arm -->
  <line x1="102" y1="152" x2="214" y2="235"
        stroke="#D9A35B" stroke-width="24" stroke-linecap="round"/>

  <!-- Accent node dots at arm tips -->
  <circle cx="214" cy="65" r="8" fill="#EBC47A"/>
  <circle cx="214" cy="235" r="8" fill="#EBC47A"/>

  <!-- Subtle accent node at stem top -->
  <circle cx="90" cy="60" r="5" fill="#A17541"/>
</svg>
